<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<style>

header{
    background:#0d1b2a;
    padding:15px 20px;
}

header h1{
    color:#fff;
    text-align:center;
    margin-bottom:15px;
}

nav{
    background:#1b263b;
    border-radius:8px;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    padding:10px;
}

nav ul li{
    margin:8px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    padding:10px 18px;
    border-radius:5px;
    transition:0.3s;
    font-weight:bold;
}

nav ul li a:hover{
    background:#00b4d8;
    color:white;
}

nav ul li a.active{
    background:#0077b6;
}

/* Mobile Responsive */

@media screen and (max-width:768px){

nav ul{
    flex-direction:column;
}

nav ul li{
    width:100%;
    text-align:center;
}

nav ul li a{
    display:block;
}

}
    
    audio,
video,
iframe{
    display:block;
    margin:20px auto;
    max-width:100%;
}

iframe{
    border:3px solid #0d1b2a;
    border-radius:8px;
}
</style>
<body>

<header>
    <h1>Media Page</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="certificate.html">Certificate</a></li>
            <li><a href="education.html">Education</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="intro">

    <h2>Audio Example</h2>

    <audio controls>
        <source src="media/audio.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <br><br>

    <h2>Video Example</h2>

    <video width="500" controls>
        <source src="media/video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <br><br>

    <h2>YouTube Video</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/mU6anWqZJcc"
        title="YouTube video player"
        frameborder="0"
        allowfullscreen>
    </iframe>

</section>

<footer>
    <p>© 2026 Ahmad Usman Abubakar</p>
</footer>

</body>
</html>
